<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Create Order - KYN AURA</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
<div th:replace="fragments/menu :: sidebar('sale')"></div>
<div class="page-shell">
<div th:replace="fragments/menu :: topbar('Create Order')"></div>
<div class="section-bar">
    <div th:replace="fragments/menu :: saleChild('new')"></div>
</div>
<main>
    <p class="error" th:if="${error}" th:text="${error}"></p>
    <p class="success" th:if="${success}" th:text="${success}"></p>
    <section class="card" th:if="${stockProductId && @permissionService.has('STOCK','STOCK')}">
        <p>
            <strong th:text="${stockProductName}">Product</strong>
            is out of stock.
        </p>
        <button class="button" type="button" onclick="openStockModal()">Add Stock</button>
    </section>
    <section class="card">
        <form th:action="@{/orders}" th:object="${orderForm}" method="post">
            <h2>Customer</h2>
            <label>Search Existing Customer</label>
            <input type="hidden" id="customerId" th:field="*{customerId}">
            <input id="customerSearch" list="customerOptions" placeholder="Type customer name, phone, or tax number">
            <datalist id="customerOptions">
                <option th:each="customer : ${customers}"
                        th:value="${customer.name + ' | ' + (customer.phoneNumber ?: '-') + ' | Tax: ' + (customer.taxNumber ?: '-')}"
                        th:attr="data-id=${customer.id},data-type=${customer.type},data-name=${customer.name},data-tax=${customer.taxNumber},data-address=${customer.address},data-phone=${customer.phoneNumber}"></option>
            </datalist>

            <div class="grid">
                <div>
                    <label>Customer Type</label>
                    <select id="customerType" th:field="*{customerType}">
                        <option value="INDIVIDUAL">Individual</option>
                        <option value="ORGANIZATION">Organization</option>
                    </select>
                </div>
                <div>
                    <label>Customer Name</label>
                    <input id="customerName" th:field="*{customerName}">
                </div>
                <div>
                    <label>Tax Number</label>
                    <input id="customerTaxNumber" th:field="*{customerTaxNumber}">
                </div>
                <div>
                    <label>Customer Phone</label>
                    <input id="customerPhone" th:field="*{customerPhone}">
                </div>
            </div>

            <label>Address</label>
            <textarea id="customerAddress" th:field="*{customerAddress}" rows="2"></textarea>

            <h2>Order Discount</h2>
            <div class="grid">
                <div>
                    <label>Discount Per Order</label>
                    <input type="number" step="0.01" min="0" th:field="*{discountAmount}">
                </div>
            </div>

            <h2>Items</h2>
            <table>
                <thead>
                <tr>
                    <th>Product</th>
                    <th>Quantity</th>
                    <th>Discount Per Item</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="line, stat : *{lines}">
                    <td>
                        <input type="hidden"
                               class="product-id-input"
                               th:field="*{lines[__${stat.index}__].productId}">
                        <input class="product-search-input"
                               list="productOptions"
                               placeholder="Type SKU or product name">
                        <button class="button create-product-row-button"
                                th:if="${@permissionService.has('PRODUCT','CREATE')}"
                                type="button"
                                style="display:none"
                                onclick="openProductModal(this)">Create Product</button>
                    </td>
                    <td>
                        <input type="number" min="0" th:field="*{lines[__${stat.index}__].quantity}">
                    </td>
                    <td>
                        <input type="number" step="0.01" min="0" th:field="*{lines[__${stat.index}__].discountAmount}">
                    </td>
                </tr>
                </tbody>
            </table>
            <datalist id="productOptions">
                <option th:each="product : ${products}"
                        th:value="${product.sku + ' - ' + product.name + ' | price: ' + @formatUtils.vnd(product.salePrice) + ' | stock: ' + @formatUtils.qty(product.stockQuantity)}"
                        th:attr="data-id=${product.id}"></option>
            </datalist>

            <button class="button" type="submit">Create Invoice</button>
        </form>
    </section>
</main>
</div>
</div>
<div class="modal-backdrop" id="stockModal" th:if="${stockProductId && @permissionService.has('STOCK','STOCK')}">
    <div class="modal-card">
        <h2>Add Stock</h2>
        <p class="muted" th:text="${stockProductName}">Product</p>
        <form th:action="@{/orders/stock/import}" method="post">
            <input type="hidden" name="productId" th:value="${stockProductId}">

            <label>Quantity</label>
            <input type="number" min="1" name="quantity" value="1" required>

            <label>Import Unit Price</label>
            <input type="number" step="0.01" min="0" name="unitCost" th:value="${stockImportPrice}">

            <div class="modal-actions">
                <button class="button" type="submit">Save Stock</button>
                <button class="button secondary-button" type="button" onclick="closeStockModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>
<div class="modal-backdrop" id="productModal" th:if="${@permissionService.has('PRODUCT','CREATE')}">
    <div class="modal-card">
        <h2>Create Product</h2>
        <p class="muted">Create the product without leaving this order.</p>
        <form id="quickProductForm">
            <label>SKU</label>
            <input id="quickProductSku" name="sku" required>

            <label>Name</label>
            <input id="quickProductName" name="name" required>

            <div class="grid">
                <div>
                    <label>Brand</label>
                    <select name="brandId">
                        <option value="">No brand</option>
                        <option th:each="brand : ${brands}" th:value="${brand.id}" th:text="${brand.name}"></option>
                    </select>
                </div>
                <div>
                    <label>Category</label>
                    <select name="categoryId">
                        <option value="">No category</option>
                        <option th:each="category : ${categories}" th:value="${category.id}" th:text="${category.name}"></option>
                    </select>
                </div>
            </div>

            <label>Description</label>
            <textarea name="description" rows="2"></textarea>

            <div class="grid">
                <div>
                    <label>Import Unit Price</label>
                    <input type="number" step="0.01" min="0" name="importPrice" value="0" required>
                </div>
                <div>
                    <label>Sale Price</label>
                    <input type="number" step="0.01" min="0" name="salePrice" value="0" required>
                </div>
                <div>
                    <label>Initial Stock</label>
                    <input type="number" min="0" name="initialStock" value="0">
                </div>
                <div>
                    <label>Minimum Stock</label>
                    <input type="number" min="0" name="minStockLevel" value="0">
                </div>
            </div>

            <p class="error" id="quickProductError" style="display:none"></p>
            <div class="modal-actions">
                <button class="button" type="submit">Save Product</button>
                <button class="button secondary-button" type="button" onclick="closeProductModal()">Cancel</button>
            </div>
        </form>
    </div>
</div>
<script>
    const customerSearch = document.getElementById('customerSearch');
    const customerIdInput = document.getElementById('customerId');
    const customerOptions = Array.from(document.querySelectorAll('#customerOptions option'));
    let productOptions = Array.from(document.querySelectorAll('#productOptions option'));
    let activeProductInput = null;

    function findOptionByValue(options, value) {
        return options.find(option => option.value === value);
    }

    function applyCustomerSelection() {
        const selected = findOptionByValue(customerOptions, customerSearch.value);
        customerIdInput.value = selected ? selected.dataset.id : '';
        if (!selected) {
            return;
        }
        document.getElementById('customerType').value = selected.dataset.type || 'INDIVIDUAL';
        document.getElementById('customerName').value = selected.dataset.name || '';
        document.getElementById('customerTaxNumber').value = selected.dataset.tax || '';
        document.getElementById('customerAddress').value = selected.dataset.address || '';
        document.getElementById('customerPhone').value = selected.dataset.phone || '';
    }

    if (customerSearch) {
        customerSearch.addEventListener('input', applyCustomerSelection);
        const selectedCustomer = customerOptions.find(option => option.dataset.id === customerIdInput.value);
        if (selectedCustomer) {
            customerSearch.value = selectedCustomer.value;
        }
    }

    function refreshProductOptions() {
        productOptions = Array.from(document.querySelectorAll('#productOptions option'));
    }

    function syncProductSearchInput(input) {
        const hiddenInput = input.previousElementSibling;
        const createButton = input.nextElementSibling;
        const selectedProduct = productOptions.find(option => option.dataset.id === hiddenInput.value);
        if (selectedProduct) {
            input.value = selectedProduct.value;
        }
        const selected = findOptionByValue(productOptions, input.value);
        hiddenInput.value = selected ? selected.dataset.id : '';
        if (createButton) {
            createButton.style.display = input.value.trim() && !selected ? 'inline-block' : 'none';
        }
    }

    document.querySelectorAll('.product-search-input').forEach(input => {
        syncProductSearchInput(input);
        input.addEventListener('input', function () {
            syncProductSearchInput(input);
        });
    });

    function openProductModal(button) {
        activeProductInput = button.previousElementSibling;
        const typedValue = activeProductInput.value.trim();
        document.getElementById('quickProductError').style.display = 'none';
        document.getElementById('quickProductForm').reset();
        document.getElementById('quickProductSku').value = typedValue.split(' ')[0] || '';
        document.getElementById('quickProductName').value = typedValue;
        document.getElementById('productModal').classList.add('open');
    }

    function closeProductModal() {
        document.getElementById('productModal').classList.remove('open');
    }

    document.getElementById('quickProductForm').addEventListener('submit', async function (event) {
        event.preventDefault();
        const error = document.getElementById('quickProductError');
        error.style.display = 'none';
        try {
            const response = await fetch('/orders/products', {
                method: 'POST',
                body: new URLSearchParams(new FormData(event.target))
            });
            if (!response.ok) {
                throw new Error('Could not create product. Please check SKU and prices.');
            }
            const product = await response.json();
            const option = document.createElement('option');
            option.value = product.label;
            option.dataset.id = product.id;
            document.getElementById('productOptions').appendChild(option);
            refreshProductOptions();
            if (activeProductInput) {
                activeProductInput.value = product.label;
                syncProductSearchInput(activeProductInput);
            }
            closeProductModal();
        } catch (ex) {
            error.textContent = ex.message;
            error.style.display = 'block';
        }
    });

    function openStockModal() {
        const modal = document.getElementById('stockModal');
        if (modal) {
            modal.classList.add('open');
        }
    }

    function closeStockModal() {
        const modal = document.getElementById('stockModal');
        if (modal) {
            modal.classList.remove('open');
        }
    }
</script>
</body>
</html>
