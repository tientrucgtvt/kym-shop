<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reports - KYN AURA</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-shell">
<div th:replace="fragments/menu :: sidebar('report')"></div>
<div class="page-shell">
<div th:replace="fragments/menu :: topbar('Reports')"></div>
<div class="section-bar">
    <div th:replace="fragments/menu :: reportChild('sales')"></div>
</div>
<main>
    <section class="card">
        <form th:action="@{/reports}" method="get" class="grid">
            <div>
                <label>From</label>
                <input type="date" name="from" th:value="${from}">
            </div>
            <div>
                <label>To</label>
                <input type="date" name="to" th:value="${to}">
            </div>
            <div>
                <label>&nbsp;</label>
                <button class="button" type="submit">Run Report</button>
            </div>
        </form>
    </section>

    <section class="grid">
        <div class="card">
            <h2 th:text="${@formatUtils.qty(summary.orderCount)}">0</h2>
            <p>Orders</p>
        </div>
        <div class="card">
            <h2 th:text="${@formatUtils.vnd(summary.grossSales)}">0 ₫</h2>
            <p>Sale Report: Gross Sales</p>
        </div>
        <div class="card">
            <h2 th:text="${@formatUtils.vnd(summary.discounts)}">0 ₫</h2>
            <p>Discounts</p>
        </div>
        <div class="card">
            <h2 th:text="${@formatUtils.vnd(summary.refunds)}">0 ₫</h2>
            <p>Refunds</p>
        </div>
        <div class="card">
            <h2 th:text="${@formatUtils.vnd(summary.netSettlement)}">0 ₫</h2>
            <p>Settlement Report: Net Settlement</p>
        </div>
        <div class="card">
            <h2 th:text="${@formatUtils.vnd(summary.grossProfit)}">0 ₫</h2>
            <p>Estimated Gross Profit</p>
        </div>
    </section>
</main>
</div>
</div>
</body>
</html>
